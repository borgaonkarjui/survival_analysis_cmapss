<!DOCTYPE html>
<html>
<head>
    <title>Engine RUL Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2>Engine Health Predictor</h2>
        </div>
        <div class="card-body">
            <form action="/predict" method="post" class="row g-3">
                <div class="col-auto">
                    <label for="engine_id" class="form-label">Select Engine Unit ID:</label>
                    <select name="engine_id" id="engine_id" class="form-select">
                        {% for id in engines %}
                            <option value="{{ id }}" {% if id == selected_engine %}selected{% endif %}>
                                Engine #{{ id }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-auto align-self-end">
                    <button type="submit" class="btn btn-success">Predict RUL</button>
                </div>
            </form>

            <hr>

            {% if prediction %}
            <div class="alert alert-info mt-4">
                <h4>Results for Engine #{{ selected_engine }}</h4>
                <p class="display-6">Predicted Remaining Useful Life: <strong>{{ prediction }} Cycles</strong></p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
